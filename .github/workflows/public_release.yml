name: Public Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Build desktop applications
        run: |
          python setup.py build_apps

      - name: Package release ZIPs
        shell: python
        run: |
          import os
          import shutil
          import re
          import sys
          from pathlib import Path
          
          # Detect version from pyproject.toml
          version = None
          pyproject = Path("pyproject.toml")
          if pyproject.exists():
              content = pyproject.read_text(encoding="utf-8")
              match = re.search(r'^version\s*=\s*["\']([^"\']+)["\']', content, re.MULTILINE)
              if match:
                  version = match.group(1)
                  print(f"Detected version: {version}")
          
          if not version:
              print("Error: Could not detect version from pyproject.toml")
              sys.exit(1)
              
          build_root = Path("build")
          dist_dir = Path("dist")
          dist_dir.mkdir(parents=True, exist_ok=True)
          
          platforms = {
              "win_amd64": "Windows",
              "manylinux2014_x86_64": "Linux",
              "macosx_10_13_x86_64": "macOS"
          }
          
          missing = []
          created = []
          for build_dir, label in platforms.items():
              src = build_root / build_dir
              if src.exists():
                  archive_base = dist_dir / f"ToBoldlyRespawn_{label}_v{version}"
                  zip_path = shutil.make_archive(str(archive_base), "zip", src)
                  print(f"Created package: {zip_path}")
                  created.append(zip_path)
              else:
                  print(f"Error: Expected build directory not found: {src}")
                  missing.append(build_dir)
                  
          if missing:
              print(f"Error: Missing expected platform build directories: {', '.join(missing)}")
              sys.exit(1)
              
          print(f"Successfully packaged {len(created)} ZIPs.")

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
